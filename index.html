<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEN PHARMA — 약 정보 검색</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0D;--bg2:#141414;--bg3:#1A1A1A;
  --surface:#1E1E1E;--surface2:#252525;
  --border:#2E2E2E;--border2:#3A3A3A;
  --red:#C0392B;--red2:#E74C3C;--red-dim:#7A1E14;--red-glow:#C0392B33;
  --gold:#C9A84C;--gold-dim:#6B5520;
  --text:#E8E0D0;--text2:#A09880;--text3:#5A5248;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 79px,#ffffff04 79px,#ffffff04 80px),repeating-linear-gradient(90deg,transparent,transparent 79px,#ffffff03 79px,#ffffff03 80px);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:conic-gradient(from 0deg,transparent 0deg,#C0392B08 2deg,transparent 4deg,transparent 8deg,#C0392B05 10deg,transparent 12deg);pointer-events:none;z-index:0;}
header{position:relative;z-index:10;background:var(--bg2);border-bottom:2px solid var(--red);padding:0 2rem;display:flex;align-items:stretch;justify-content:space-between;}
.logo-block{display:flex;align-items:center;padding:0.75rem 0;}
.logo-nen{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;color:var(--red2);letter-spacing:4px;}
.logo-pharma{font-family:'Oswald',sans-serif;font-size:0.65rem;color:var(--gold);letter-spacing:6px;text-transform:uppercase;display:block;margin-top:2px;}
.logo-sep{width:2px;background:var(--red-dim);margin:0 1.2rem;align-self:stretch;}
.logo-sub{font-family:'Oswald',sans-serif;font-size:0.7rem;color:var(--text3);letter-spacing:3px;text-transform:uppercase;align-self:center;}
.rank-badge{align-self:center;background:var(--red-dim);border:1px solid var(--red);color:var(--red2);font-family:'Oswald',sans-serif;font-size:0.62rem;letter-spacing:2px;padding:4px 10px;text-transform:uppercase;}
.hero{position:relative;z-index:2;padding:3rem 2rem 2.5rem;max-width:760px;margin:0 auto;}
.hero::before{content:'';position:absolute;top:2rem;left:2rem;width:20px;height:20px;border-top:2px solid var(--red);border-left:2px solid var(--red);}
.hero::after{content:'';position:absolute;bottom:1rem;right:2rem;width:20px;height:20px;border-bottom:2px solid var(--gold-dim);border-right:2px solid var(--gold-dim);}
.eyebrow{font-family:'Oswald',sans-serif;font-size:0.62rem;letter-spacing:4px;color:var(--red2);text-transform:uppercase;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;}
.eyebrow::before{content:'';display:inline-block;width:24px;height:1px;background:var(--red2);}
.hero-title{font-family:'Black Han Sans',sans-serif;font-size:2.8rem;color:var(--text);line-height:1.05;letter-spacing:-1px;margin-bottom:0.5rem;}
.hero-title em{font-style:normal;color:var(--red2);}
.hero-desc{font-size:0.82rem;color:var(--text2);letter-spacing:0.5px;margin-bottom:2rem;font-weight:300;}
.search-outer{position:relative;margin-bottom:1.25rem;}
.search-outer::before{content:'';position:absolute;left:-8px;top:0;bottom:0;width:3px;background:var(--red);clip-path:polygon(0 4px,100% 0,100% 100%,0 calc(100% - 4px));}
.search-wrap{display:flex;background:var(--surface);border:1px solid var(--border2);border-top:2px solid var(--red-dim);overflow:hidden;transition:border-color 0.2s;}
.search-wrap:focus-within{border-color:var(--red);border-top-color:var(--red2);}
#searchInput{flex:1;border:none;outline:none;padding:1rem 1.25rem;font-family:'Noto Sans KR',sans-serif;font-size:0.95rem;background:transparent;color:var(--text);}
#searchInput::placeholder{color:var(--text3);font-weight:300;}
#searchBtn{background:var(--red);color:#fff;border:none;padding:0 1.75rem;font-family:'Oswald',sans-serif;font-size:0.9rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:background 0.15s;white-space:nowrap;}
#searchBtn:hover{background:var(--red2);}
#searchBtn:active{transform:scale(0.98);}
#searchBtn:disabled{background:var(--red-dim);cursor:not-allowed;}
.chips-label{font-family:'Oswald',sans-serif;font-size:0.6rem;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:0.5rem;}
.chips{display:flex;flex-wrap:wrap;gap:0.4rem;}
.chip{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:0.25rem 0.75rem;font-family:'Oswald',sans-serif;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;clip-path:polygon(6px 0,100% 0,100% 100%,0 100%,0 6px);}
.chip:hover{border-color:var(--red);color:var(--red2);background:var(--red-glow);}
.main{position:relative;z-index:2;max-width:760px;margin:0 auto;padding:0 2rem 5rem;}
.loading{display:none;text-align:center;padding:4rem 0;}
.loading.show{display:block;}
.aura-ring{width:60px;height:60px;border:2px solid var(--border2);border-top-color:var(--red2);border-right-color:var(--red-dim);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 1.25rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Oswald',sans-serif;font-size:0.7rem;letter-spacing:4px;color:var(--red2);text-transform:uppercase;animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
.error-box{display:none;border:1px solid var(--red-dim);border-left:3px solid var(--red2);background:rgba(192,57,43,0.08);padding:1rem 1.25rem;font-size:0.875rem;color:var(--red2);white-space:pre-line;}
.error-box.show{display:block;}
.result-list{display:none;}
.result-list.show{display:block;}
.result-count{font-family:'Oswald',sans-serif;font-size:0.62rem;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}
.result-count span{color:var(--red2);}
.drug-card{background:var(--surface);border:1px solid var(--border2);border-top:3px solid var(--red);margin-bottom:1rem;animation:fadeUp 0.3s ease;position:relative;overflow:hidden;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-header{background:var(--surface2);border-bottom:1px solid var(--border);padding:1rem 1.25rem;display:flex;align-items:flex-start;gap:1rem;}
.drug-icon{width:44px;height:44px;background:var(--red-dim);border:1px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}
.drug-name{font-family:'Black Han Sans',sans-serif;font-size:1.2rem;color:var(--text);line-height:1.1;}
.drug-engname{font-size:0.75rem;color:var(--text3);font-weight:300;margin-top:2px;}
.drug-category{font-family:'Oswald',sans-serif;font-size:0.62rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-top:4px;display:flex;align-items:center;gap:0.4rem;}
.drug-category::before{content:'';display:inline-block;width:10px;height:1px;background:var(--gold-dim);}
.card-body{padding:1rem 1.25rem;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.75rem;margin-bottom:0.75rem;}
.info-label{font-family:'Oswald',sans-serif;font-size:0.55rem;letter-spacing:2.5px;color:var(--red2);text-transform:uppercase;margin-bottom:3px;}
.info-val{font-size:0.82rem;color:var(--text2);font-weight:300;line-height:1.5;}
.effect-section{margin-top:0.75rem;}
.effect-text{font-size:0.82rem;color:var(--text2);line-height:1.7;font-weight:300;}
.warn-row{margin-top:0.75rem;background:rgba(192,57,43,0.07);border:1px solid var(--red-dim);border-left:3px solid var(--red2);padding:0.6rem 0.85rem;font-size:0.78rem;color:var(--red2);line-height:1.6;}
.warn-row::before{content:'! ';font-family:'Oswald',sans-serif;font-weight:700;}
.card-footer{background:var(--bg2);border-top:1px solid var(--border);padding:0.6rem 1.25rem;font-family:'Oswald',sans-serif;font-size:0.58rem;letter-spacing:2px;color:var(--text3);text-transform:uppercase;display:flex;justify-content:space-between;}
.empty{text-align:center;padding:5rem 2rem;color:var(--text3);}
.empty-glyph{font-family:'Oswald',sans-serif;font-size:5rem;font-weight:700;color:var(--border2);line-height:1;margin-bottom:1rem;letter-spacing:-4px;}
.empty p{font-family:'Oswald',sans-serif;font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--text3);line-height:2;}
@media(max-width:600px){
  .hero{padding:2rem 1.25rem 2rem;}
  .hero-title{font-size:2rem;}
  .main{padding:0 1.25rem 4rem;}
  header{padding:0 1.25rem;}
  .logo-sub,.rank-badge{display:none;}
}
</style>
</head>
<body>
<header>
  <div class="logo-block">
    <div>
      <span class="logo-nen">NEN</span>
      <span class="logo-pharma">Pharma System</span>
    </div>
    <div class="logo-sep"></div>
    <span class="logo-sub">약 정보 검색</span>
  </div>
  <div class="rank-badge">식약처 공식 DB</div>
</header>
<div class="hero">
  <div class="eyebrow">e약은요 · 식품의약품안전처</div>
  <h1 class="hero-title">어떤 약을<br><em>찾고 있나?</em></h1>
  <p class="hero-desc">약 이름을 입력하면 식약처 공식 DB에서 실제 허가 정보를 가져옵니다.</p>
  <div class="search-outer">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="타이레놀, 판콜, 게보린..." autocomplete="off" />
      <button id="searchBtn" onclick="searchMedicine()">SEARCH</button>
    </div>
  </div>
  <div class="chips-label">빠른 검색</div>
  <div class="chips">
    <span class="chip" onclick="quickSearch('타이레놀')">타이레놀</span>
    <span class="chip" onclick="quickSearch('판콜')">판콜</span>
    <span class="chip" onclick="quickSearch('게보린')">게보린</span>
    <span class="chip" onclick="quickSearch('이부프로펜')">이부프로펜</span>
    <span class="chip" onclick="quickSearch('텐텐')">텐텐</span>
    <span class="chip" onclick="quickSearch('박카스')">박카스</span>
    <span class="chip" onclick="quickSearch('훼스탈')">훼스탈</span>
    <span class="chip" onclick="quickSearch('베아제')">베아제</span>
  </div>
</div>
<div class="main">
  <div class="loading" id="loading">
    <div class="aura-ring"></div>
    <div class="loading-text">식약처 DB 조회 중...</div>
  </div>
  <div class="error-box" id="errorBox"></div>
  <div class="result-list" id="resultList">
    <div class="result-count" id="resultCount"></div>
    <div id="resultCards"></div>
  </div>
  <div class="empty" id="emptyState">
    <div class="empty-glyph">Rx</div>
    <p>검색어를 입력하세요<br>식약처 공식 DB에서 실제 약 정보를 검색합니다</p>
  </div>
</div>
<script>
async function searchMedicine(query) {
  const input = (query || document.getElementById('searchInput').value).trim();
  if (!input) return;
  document.getElementById('searchInput').value = input;
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('resultList').classList.remove('show');
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('emptyState').style.display = 'none';

  try {
    const res = await fetch(`/.netlify/functions/drug?name=${encodeURIComponent(input)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const items = data?.body?.items;
    const total = data?.body?.totalCount || 0;
    if (!items || items.length === 0) {
      showError(`"${input}" 검색 결과가 없습니다.\n정확한 약품명으로 다시 검색해보세요.`);
      return;
    }
    showResults(items, total, input);
  } catch(e) {
    showError('데이터를 불러오지 못했습니다.\n오류: ' + e.message);
  } finally {
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('loading').classList.remove('show');
  }
}

function showResults(items, total, query) {
  document.getElementById('resultCount').innerHTML = `"${query}" 검색결과 — <span>${Number(total).toLocaleString()}건</span> 중 ${items.length}건 표시`;
  document.getElementById('resultCards').innerHTML = items.map((item, i) => {
    const name = item.itemName || '—';
    const engName = item.entpName || '';
    const effect = clean(item.efcyQesitm) || '—';
    const usage = clean(item.useMethodQesitm) || '—';
    const warn = clean(item.atpnWarnQesitm || item.atpnQesitm) || '';
    const storage = clean(item.depositMethodQesitm) || '';
    const otc = item.etcOtcCode || '';
    const classNo = item.classNo || '';
    return `
    <div class="drug-card" style="animation-delay:${i*0.05}s">
      <div class="card-header">
        <div class="drug-icon">💊</div>
        <div>
          <div class="drug-name">${name}</div>
          ${engName ? `<div class="drug-engname">${engName}</div>` : ''}
          <div class="drug-category">${otc === '전문의약품' ? '처방전 필요' : otc === '일반의약품' ? '일반의약품' : otc || '의약품'}${classNo ? ' · ' + classNo : ''}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="info-grid">
          <div><div class="info-label">용법 · 용량</div><div class="info-val">${usage.length > 120 ? usage.slice(0,120) + '...' : usage}</div></div>
          ${storage ? `<div><div class="info-label">보관 방법</div><div class="info-val">${storage}</div></div>` : ''}
        </div>
        <div class="effect-section">
          <div class="info-label" style="margin-bottom:4px;">효능 · 효과</div>
          <div class="effect-text">${effect.length > 200 ? effect.slice(0,200) + '...' : effect}</div>
        </div>
        ${warn ? `<div class="warn-row">${warn.length > 150 ? warn.slice(0,150) + '...' : warn}</div>` : ''}
      </div>
      <div class="card-footer">
        <span>식품의약품안전처 공식 데이터</span>
        <span>${new Date().toLocaleDateString('ko-KR')} 기준</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('resultList').classList.add('show');
}

function clean(str) {
  if (!str) return '';
  return str.replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim();
}

function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = msg;
  b.classList.add('show');
  document.getElementById('emptyState').style.display = 'none';
}

function quickSearch(n) { searchMedicine(n); }
document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') searchMedicine(); });
</script>
</body>
</html>
